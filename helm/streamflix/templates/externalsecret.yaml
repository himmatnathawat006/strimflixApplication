# ==========================================
# Kubernetes ExternalSecret Template (externalsecret.yaml)
# ==========================================
# Integrates with Azure Key Vault (or other providers) using external-secrets.io.
# Syncs external credentials into a native Kubernetes Secret matching the deployment name.
# ==========================================

{{- if .Values.externalSecret.enabled -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  # Name of ExternalSecret resource (and target synced secret)
  name: {{ include "streamflix.fullname" . }}
  labels:
    {{- include "streamflix.labels" . | nindent 4 }}
spec:
  # Interval at which the operator refreshes and checks for secret value updates
  refreshInterval: 1h
  # Reference connection to the Vault SecretStore
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  # Synced native Kubernetes Secret destination properties
  target:
    name: {{ include "streamflix.fullname" . }}
    creationPolicy: Owner
  # Specific remote-to-local keys mappings
  data:
    {{- range .Values.externalSecret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
    {{- end }}
{{- end }}
